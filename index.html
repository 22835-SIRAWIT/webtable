<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเก็บข้อมูลตาราง</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold mb-6 text-slate-800 text-center">📊 ตารางบันทึกข้อมูล</h1>

        <form id="dataForm" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200">
            <input type="hidden" id="editIndex">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อ-นามสกุล</label>
                <input type="text" id="nameInput" required class="w-full p-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ตำแหน่งงาน</label>
                <input type="text" id="roleInput" required class="w-full p-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div class="flex items-end">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-150 text-sm cursor-pointer">
                    ➕ เพิ่มข้อมูล
                </button>
            </div>
        </form>

        <div class="overflow-x-auto rounded-lg border border-slate-200">
            <table class="min-w-full bg-white text-sm">
                <thead class="bg-slate-800 text-white text-left">
                    <tr>
                        <th class="py-3 px-4 font-semibold w-16 text-center">ลำดับ</th>
                        <th class="py-3 px-4 font-semibold">ชื่อ-นามสกุล</th>
                        <th class="py-3 px-4 font-semibold">ตำแหน่งงาน</th>
                        <th class="py-3 px-4 font-semibold text-center w-36">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const dataForm = document.getElementById('dataForm');
        const nameInput = document.getElementById('nameInput');
        const roleInput = document.getElementById('roleInput');
        const editIndexInput = document.getElementById('editIndex');
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');

        let dataList = JSON.parse(localStorage.getItem('myTableData')) || [];

        function renderTable() {
            tableBody.innerHTML = '';
            if (dataList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-slate-400">ยังไม่มีข้อมูลในระบบ</td></tr>`;
                return;
            }
            dataList.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50';
                row.innerHTML = `
                    <td class="py-3 px-4 text-center text-slate-500">${index + 1}</td>
                    <td class="py-3 px-4 font-medium text-slate-900">${item.name}</td>
                    <td class="py-3 px-4 text-slate-600">${item.role}</td>
                    <td class="py-3 px-4 text-center space-x-1">
                        <button onclick="editData(${index})" class="bg-amber-500 hover:bg-amber-600 text-white px-2.5 py-1 rounded text-xs font-medium transition cursor-pointer">แก้ไข</button>
                        <button onclick="deleteData(${index})" class="bg-red-500 hover:bg-red-600 text-white px-2.5 py-1 rounded text-xs font-medium transition cursor-pointer">ลบ</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            localStorage.setItem('myTableData', JSON.stringify(dataList));
        }

        dataForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = nameInput.value.trim();
            const role = roleInput.value.trim();
            const editIndex = editIndexInput.value;

            if (editIndex === "") {
                dataList.push({ name, role });
            } else {
                dataList[editIndex] = { name, role };
                editIndexInput.value = "";
                submitBtn.innerHTML = "➕ เพิ่มข้อมูล";
                submitBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-150 text-sm cursor-pointer";
            }
            dataForm.reset();
            renderTable();
        });

        window.editData = function(index) {
            nameInput.value = dataList[index].name;
            roleInput.value = dataList[index].role;
            editIndexInput.value = index;
            submitBtn.innerHTML = "💾 บันทึกแก้ไข";
            submitBtn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-4 rounded-md transition duration-150 text-sm cursor-pointer";
        };

        window.deleteData = function(index) {
            if (confirm('ยืนยันที่จะลบข้อมูลแถวนี้ใช่ไหม?')) {
                dataList.splice(index, 1);
                renderTable();
                if (editIndexInput.value == index) {
                    dataForm.reset();
                    editIndexInput.value = "";
                    submitBtn.innerHTML = "➕ เพิ่มข้อมูล";
                }
            }
        };

        renderTable();
    </script>
</body>
</html>
